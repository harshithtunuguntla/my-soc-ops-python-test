<div id="game-container">
<main class="start-hero">

    <!-- Atmospheric overlays -->
    <div class="hero-grid-overlay" aria-hidden="true"></div>
    <div class="hero-vignette" aria-hidden="true"></div>

    <!-- Hero section -->
    <section class="hero-section" aria-labelledby="hero-title">

        <div class="hero-badge" aria-hidden="true">// SOCIAL BINGO //</div>

        <h1 id="hero-title" class="hero-title">
            <span class="hero-title-soc">SOC</span><span class="hero-title-ops">OPS</span>
        </h1>

        <p class="hero-subtitle">Connect &middot; Discover &middot; Win</p>

        <div class="hero-divider" aria-hidden="true"></div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="hero-cta btn"
            autofocus>
            Start Game
        </button>

        <p class="hero-hint">Find 5 in a row to win</p>

    </section>

    <!-- How to play section -->
    <section class="how-to-play" aria-labelledby="how-title">
        <h2 id="how-title" class="how-to-play__title">How to play</h2>
        <ol class="how-to-play__steps">
            <li class="how-to-play__step">
                <span class="step-num" aria-hidden="true">01</span>
                <span class="step-text">Find people who match the questions</span>
            </li>
            <li class="how-to-play__step">
                <span class="step-num" aria-hidden="true">02</span>
                <span class="step-text">Tap a square when you find a match</span>
            </li>
            <li class="how-to-play__step">
                <span class="step-num" aria-hidden="true">03</span>
                <span class="step-text">Get 5 in a row to win!</span>
            </li>
        </ol>
    </section>

</main>
</div>
