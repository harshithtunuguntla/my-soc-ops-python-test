<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-gray-50">
    <div class="text-center max-w-sm">
        <h1 class="text-4xl font-bold text-gray-900 mb-2">Soc Ops</h1>
        <p class="text-lg text-gray-600 mb-8">Social Bingo</p>

        <div class="bg-white rounded-lg p-6 shadow-sm border border-gray-200 mb-8">
            <h2 class="font-semibold text-gray-800 mb-3">How to play</h2>
            <ul class="text-left text-gray-600 text-sm space-y-2">
                <li>• Find people who match the questions</li>
                <li>• Tap a square when you find a match</li>
                <li>• Get 5 in a row to win!</li>
            </ul>
        </div>

        <!-- Persona selector for Tech Life Bingo -->
        <div class="bg-white rounded-lg p-4 shadow-sm border border-gray-200 mb-6 text-left">
            <label for="persona-select" class="block text-sm font-semibold text-gray-700 mb-2">
                🖥️ Tech Life Bingo persona <span class="font-normal text-gray-400">(optional)</span>
            </label>
            <select id="persona-select" name="persona"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-700 bg-white">
                <option value="">— Classic Soc Ops (no persona) —</option>
                {% for key, label in persona_options.items() %}
                <option value="{{ key }}">{{ label }}</option>
                {% endfor %}
            </select>
            <p class="text-xs text-gray-400 mt-1">
                Choosing a persona gives you tech-themed questions tailored to your role.
            </p>
        </div>

        <button
            id="start-btn"
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            hx-include="#persona-select"
            class="w-full bg-accent text-white font-semibold py-4 px-8 rounded-lg text-lg active:bg-accent-light transition-colors btn">
            Start Game
        </button>
    </div>
</div>
</div>
